name: build-and-deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      TAG: ${{ steps.tag.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push lore-site (context is repo root)
        run: |
          docker build -f lore-site/Dockerfile -t $IMAGE_PREFIX/lore-site:${{ github.sha }} .
          docker push $IMAGE_PREFIX/lore-site:${{ github.sha }}
          docker tag  $IMAGE_PREFIX/lore-site:${{ github.sha }} $IMAGE_PREFIX/lore-site:latest
          docker push $IMAGE_PREFIX/lore-site:latest

      - name: Build & push game-api
        run: |
          docker build -t $IMAGE_PREFIX/game-api:${{ github.sha }} ./game-api
          docker push $IMAGE_PREFIX/game-api:${{ github.sha }}
          docker tag  $IMAGE_PREFIX/game-api:${{ github.sha }} $IMAGE_PREFIX/game-api:latest
          docker push $IMAGE_PREFIX/game-api:latest

      - id: tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) Ensure the remote deploy directory exists
      - name: Ensure deploy dir exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      # 2) Copy ONLY the files under deploy/ to the target dir
      - name: Push deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy/*"
          target: "${{ secrets.DEPLOY_PATH }}"
          overwrite: true

      # 3) Remote deploy with verification + GHCR login
      - name: Remote deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "PWD=$(pwd)"
            ls -la

            # sanity checks
            test -f docker-compose.yml || { echo "docker-compose.yml missing in $PWD"; exit 1; }
            test -f Caddyfile || { echo "Caddyfile missing in $PWD"; exit 1; }
            [ -f .env ] || { echo "Missing .env in $PWD"; exit 1; }

            # login to GHCR so pulls work even if packages are private
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            # export dynamic vars for compose
            export IMAGE_PREFIX="${{ env.IMAGE_PREFIX }}"
            export TAG="${{ needs.build.outputs.TAG }}"

            # show compose version for clarity
            docker compose version || { echo "Docker compose not installed on server"; exit 1; }

            # bring it up
            docker compose pull || true
            docker compose up -d --remove-orphans
            docker compose ps
            docker system prune -f || true
