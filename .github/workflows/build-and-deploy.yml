name: build-and-deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      TAG: ${{ steps.tag.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push lore
        uses: docker/build-push-action@v5
        with:
          context: ./lore-site
          file: lore-site/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/lore:${{ env.TAG }}
            ${{ env.IMAGE_PREFIX }}/lore:latest
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Build & push game-api
        uses: docker/build-push-action@v5
        with:
          context: ./game-api
          file: game-api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/game-api:${{ env.TAG }}
            ${{ env.IMAGE_PREFIX }}/game-api:latest

      - id: tag
        run: echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure remote deploy dir exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy/*"
          target: "${{ secrets.DEPLOY_PATH }}"
          overwrite: true

      - name: Remote compose up
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "PWD=$(pwd)"; ls -la

            # Flatten nested deploy/ if present
            if [ -d deploy ] && [ -f deploy/docker-compose.yml ]; then
              shopt -s dotglob nullglob || true
              mv deploy/* .
              rmdir deploy || true
            fi

            # Sanity checks
            test -f docker-compose.yml || { echo "docker-compose.yml missing"; exit 1; }
            test -f Caddyfile || { echo "Caddyfile missing"; exit 1; }
            [ -f .env ] || { echo "Missing .env"; exit 1; }

            # GHCR login for private pulls
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            # Clean and redeploy (handles compose “recreate” flakiness)
            docker compose down --remove-orphans || true
            docker system prune -f || true
            export IMAGE_PREFIX="${{ env.IMAGE_PREFIX }}"
            export TAG="${{ needs.build.outputs.TAG }}"
            docker compose pull || true
            docker compose up -d --force-recreate
            docker compose ps
