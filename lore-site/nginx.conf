server {
  listen 80;
  server_name _;

  add_header X-Content-Type-Options nosniff;

  location = /healthz.txt {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "public, max-age=3600" always;
  }
}
