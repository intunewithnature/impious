services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80","443:443"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      lore:
        condition: service_healthy
      wiki:
        condition: service_healthy
      game:
        condition: service_healthy
    environment:
      - CADDY_EMAIL=${CADDY_EMAIL}
      - LORE_DOMAIN=${LORE_DOMAIN:-impious.io}
      - GAME_DOMAIN=${GAME_DOMAIN:-game.impious.io}
      - WIKI_DOMAIN=${WIKI_DOMAIN:-wiki.impious.io}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  lore:
    image: "${IMAGE_PREFIX}/lore:${TAG}"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz.txt"]
      interval: 30s
      timeout: 3s
      retries: 3

  wiki:
    image: "${IMAGE_PREFIX}/wiki:${TAG}"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz.txt"]
      interval: 30s
      timeout: 3s
      retries: 3

  game:
    image: "${IMAGE_PREFIX}/game:${TAG}"
    restart: unless-stopped
    environment:
      - PORT=8080
    expose: ["8080"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
