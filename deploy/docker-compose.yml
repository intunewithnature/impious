services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80","443:443"]
    environment:
      - CADDY_EMAIL=${CADDY_EMAIL}
      - LORE_DOMAIN=${LORE_DOMAIN}
      - GAME_DOMAIN=${GAME_DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  lore:
    image: "${IMAGE_PREFIX}/lore:${TAG}"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz.txt"]
      interval: 30s
      timeout: 3s
      retries: 3

  wiki:
    image: "${IMAGE_PREFIX}/wiki:${TAG}"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz.txt"]
      interval: 30s
      timeout: 3s
      retries: 3

  game:
    image: ${IMAGE_PREFIX:-ghcr.io/intunewithnature/impious}/game-api:${TAG:-latest}
    restart: unless-stopped
    expose: ["8080"]

volumes:
  caddy_data:
  caddy_config:
